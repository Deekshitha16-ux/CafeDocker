<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cafe Aroma</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HERO -->
<div class="hero">
    <div class="overlay">
        <h1>Cafe Aroma ☕</h1>
        <p>Fresh Coffee | Cozy Vibes</p>
    </div>
</div>

<!-- MENU -->
<section class="menu">
    <h2>Our Menu</h2>

    <div class="menu-grid">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
            <h3>Espresso</h3>
            <p>₹100</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
            <h3>Cappuccino</h3>
            <p>₹150</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1498804103079-a6351b050096">
            <h3>Cold Coffee</h3>
            <p>₹200</p>
        </div>

    </div>
</section>

<!-- GALLERY -->
<section class="gallery">
    <h2>Our Cafe</h2>

    <div class="gallery-grid">
        <img src="https://images.unsplash.com/photo-1445116572660-236099ec97a0">
        <img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb">
        <img src="https://images.unsplash.com/photo-1453614512568-c4024d13c247">
        <img src="https://images.unsplash.com/photo-1463797221720-6b07e6426c24">
    </div>
</section>

</body>
</html>
